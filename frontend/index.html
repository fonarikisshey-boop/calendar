<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Telegram Calendar Mini App" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Telegram Calendar</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background: linear-gradient(135deg, #0a0a0f 0%, #12121a 50%, #1a1a25 100%);
        color: #e2e8f0;
        font-family: 'JetBrains Mono', monospace;
      }
      #root {
        min-height: 100vh;
      }
      #fallback-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #0a0a0f 0%, #12121a 50%, #1a1a25 100%);
        z-index: 9999;
      }
      #fallback-loader .loader {
        width: 50px;
        height: 50px;
        border: 3px solid rgba(37, 37, 53, 0.5);
        border-top: 3px solid #06b6d4;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      #fallback-loader .text {
        margin-top: 20px;
        color: #94a3b8;
        font-size: 14px;
      }
      #fallback-loader .error {
        margin-top: 10px;
        color: #ef4444;
        font-size: 12px;
        display: none;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="fallback-loader">
      <div class="loader"></div>
      <div class="text">Загрузка...</div>
      <div class="error" id="loader-error">Ошибка загрузки. Проверьте консоль (F12).</div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Убираем fallback loader когда React загрузится
      window.addEventListener('load', function() {
        setTimeout(function() {
          var loader = document.getElementById('fallback-loader');
          var error = document.getElementById('loader-error');
          if (loader) {
            // Проверяем, загрузился ли React
            var root = document.getElementById('root');
            if (root && root.children.length === 0) {
              // React не отрисовал ничего
              error.style.display = 'block';
            } else {
              // React загрузился - скрываем loader
              loader.style.display = 'none';
            }
          }
        }, 3000); // Ждем 3 секунды
      });
    </script>
  </body>
</html>
